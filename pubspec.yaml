name: mi_almacen
description: "Sistema de gestión de materiales de proyectos"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5


  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  cupertino_icons: ^1.0.8
  uuid: ^4.4.0

  excel: ^4.0.6      # crear/editar xlsx real (con estilos, no solo csv)
  share_plus: ^10.1.0
  path:
  path_provider:

  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.1
  file_selector: ^1.0.4

  firebase_core:
  firebase_auth:
  cloud_firestore:

  spreadsheet_decoder: ^2.3.0


  shared_preferences:

  http: ^1.2.0

  intl:


dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0

flutter:


  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/logo_ext.png
    - assets/images/logo_bn.png
    - assets/images/logo_letter.png
